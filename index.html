<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luda's Calculator</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LudaCalc">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2851/2851574.png">

    <style>
        :root {
            --primary: #6366f1; --secondary: #a855f7;
            --glass: rgba(255, 255, 255, 0.9); --text: #0f172a;
            --success: #10b981; --error: #ef4444;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: linear-gradient(135deg, #e0e7ff 0%, #fae8ff 100%);
            margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--text);
        }

        .container { 
            background: var(--glass); backdrop-filter: blur(10px);
            width: 100%; max-width: 420px; padding: 25px; border-radius: 24px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.5);
            box-sizing: border-box;
        }

        h1 { font-size: 1.6rem; text-align: center; margin: 0; color: #4338ca; }
        .subtitle { text-align: center; font-size: 0.8rem; color: #6366f1; margin-bottom: 20px; font-weight: 500; }

        .section-label { font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin: 15px 0 8px 0; letter-spacing: 1px; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .input-group { margin-bottom: 12px; }
        .input-grid-three { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        
        label { display: block; font-size: 0.7rem; font-weight: 700; margin-bottom: 4px; color: #475569; }
        
        input, select { 
            width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 10px; 
            font-size: 0.95rem; box-sizing: border-box; outline: none; background: rgba(255,255,255,0.8);
        }

        .select-wrapper { position: relative; }
        .select-wrapper::after { content: "▼"; font-size: 0.7rem; color: #6366f1; position: absolute; right: 10px; top: 35%; pointer-events: none; }

        button { 
            width: 100%; padding: 16px; background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); margin-top: 10px;
        }

        #results { margin-top: 20px; display: none; }

        .card { 
            background: white; padding: 12px 16px; border-radius: 16px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #f1f5f9;
        }

        .label-text { font-size: 0.85rem; font-weight: 600; color: #64748b; }
        .price-text { font-weight: 800; font-size: 1.2rem; color: #4338ca; }
        
        .no-card { background: #f8fafc; border: 1px dashed #cbd5e1; }
        
        .validation-box { margin-top: 15px; padding: 12px; border-radius: 12px; text-align: center; font-size: 0.75rem; font-weight: 600; }
        .valid-ok { background: #d1fae5; color: var(--success); }
        .valid-err { background: #fee2e2; color: var(--error); }
        .footer { text-align: center; font-size: 0.7rem; color: #94a3b8; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏸 Luda's Calc</h1>
    <div class="subtitle">Precision Group Splitter</div>
    
    <div class="section-label">Club Costs</div>
    <div class="input-grid">
        <div class="input-group">
            <label>Full Court Fee</label>
            <input type="number" id="fullFee" value="600">
        </div>
        <div class="input-group">
            <label>Cash Paid to Club</label>
            <input type="number" id="cashPaid" value="270">
        </div>
    </div>

    <div class="input-grid">
        <div class="input-group">
            <label>Duration</label>
            <div class="select-wrapper">
                <select id="sessionHours">
                    <option value="1">1 Hour</option>
                    <option value="1.5">1.5 Hours</option>
                    <option value="2" selected>2 Hours</option>
                    <option value="2.5">2.5 Hours</option>
                    <option value="3">3 Hours</option>
                    <option value="4">4 Hours</option>
                    <option value="5">5 Hours</option>
                </select>
            </div>
        </div>
        <div class="input-group">
            <label>Shuttle Cost</label>
            <input type="number" id="shuttleCost" value="75">
        </div>
    </div>

    <div class="section-label">Player Counts</div>
    <div class="input-grid-three">
        <div><label>Plus</label><input type="number" id="cntPlus" value="10"></div>
        <div><label>Light</label><input type="number" id="cntLight" value="2"></div>
        <div><label>No Card</label><input type="number" id="cntNone" value="3"></div>
    </div>

    <button onclick="calculate()">Calculate Now</button>

    <div id="results">
        <div class="card"><span class="label-text" id="plusLabel">Plus Price</span><span id="resPlus" class="price-text"></span></div>
        <div class="card"><span class="label-text">Light Price</span><span id="resLight" class="price-text"></span></div>
        <div class="card no-card"><span class="label-text">No Card Price</span><span id="resNoCard" class="price-text"></span></div>
        <div id="validationBox" class="validation-box"></div>
        <div class="footer">Designed for Luda</div>
    </div>
</div>

<script>
    function calculate() {
        const cashPaid = parseFloat(document.getElementById('cashPaid').value) || 0;
        const shuttles = parseFloat(document.getElementById('shuttleCost').value) || 0;
        const hours = parseFloat(document.getElementById('sessionHours').value) || 1;
        
        const cPlus = parseInt(document.getElementById('cntPlus').value) || 0;
        const cLight = parseInt(document.getElementById('cntLight').value) || 0;
        const cNone = parseInt(document.getElementById('cntNone').value) || 0;
        
        const totalPlayers = cPlus + cLight + cNone;
        if (totalPlayers === 0) return;

        const totalToRecover = cashPaid + shuttles;
        const swipeVal = 15.0;

        // Individual Discounts relative to No Card users
        const plusDisc = Math.max(1, Math.floor(hours)) * swipeVal;
        const lightDisc = 15.0;

        // Formula: (Total Cash Needed + Sum of all Discounts) / Total Players = Base Price
        const totalDiscounts = (cPlus * plusDisc) + (cLight * lightDisc);
        const basePrice = (totalToRecover + totalDiscounts) / totalPlayers;

        const costPlus = Math.max(0, basePrice - plusDisc);
        const costLight = Math.max(0, basePrice - lightDisc);
        const costNone = basePrice;

        // Verification: (Price * Count) + (Price * Count)...
        const checkSum = (costPlus * cPlus) + (costLight * cLight) + (costNone * cNone);
        
        document.getElementById('plusLabel').innerText = `PLUS (${plusDisc} PLN off)`;
        document.getElementById('resPlus').innerText = costPlus.toFixed(2) + " PLN";
        document.getElementById('resLight').innerText = costLight.toFixed(2) + " PLN";
        document.getElementById('resNoCard').innerText = costNone.toFixed(2) + " PLN";

        const vBox = document.getElementById('validationBox');
        vBox.className = "validation-box valid-ok";
        vBox.innerText = `✅ Verified: You will collect exactly ${checkSum.toFixed(2)} PLN`;
        
        document.getElementById('results').style.display = 'block';
    }
</script>

</body>
</html>
