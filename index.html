<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luda's Calculator</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LudaCalc">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2851/2851574.png">

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --glass: rgba(255, 255, 255, 0.9);
            --text: #0f172a;
            --success: #10b981;
            --error: #ef4444;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: linear-gradient(135deg, #e0e7ff 0%, #fae8ff 100%);
            margin: 0; padding: 15px; 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--text);
        }

        .container { 
            background: var(--glass);
            backdrop-filter: blur(10px);
            width: 100%; max-width: 400px; 
            padding: 25px; border-radius: 24px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
            box-sizing: border-box;
        }

        h1 { font-size: 1.6rem; text-align: center; margin: 0; color: #4338ca; }
        .subtitle { text-align: center; font-size: 0.8rem; color: #6366f1; margin-bottom: 20px; font-weight: 500; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .input-group { margin-bottom: 12px; }
        
        label { display: block; font-size: 0.7rem; font-weight: 700; margin-bottom: 4px; color: #475569; text-transform: uppercase; }
        
        input, select { 
            width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px; 
            font-size: 1rem; box-sizing: border-box; outline: none;
            background: rgba(255,255,255,0.8);
            appearance: none;
        }

        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: "▼"; font-size: 0.7rem; color: #6366f1;
            position: absolute; right: 12px; top: 40%; pointer-events: none;
        }

        button { 
            width: 100%; padding: 16px; 
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white; border: none; border-radius: 14px; 
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            margin-top: 10px;
        }

        #results { margin-top: 20px; display: none; }

        .card { 
            background: white; padding: 14px 16px; border-radius: 16px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #f1f5f9;
        }

        .label-text { font-size: 0.85rem; font-weight: 600; color: #64748b; }
        .price-text { font-weight: 800; font-size: 1.2rem; color: #4338ca; }
        
        .no-card { background: #f8fafc; border: 1px dashed #cbd5e1; }
        
        .validation-box {
            margin-top: 15px; padding: 12px; border-radius: 12px;
            text-align: center; font-size: 0.75rem; font-weight: 600;
        }
        .valid-ok { background: #d1fae5; color: var(--success); }
        .valid-err { background: #fee2e2; color: var(--error); }

        .footer { text-align: center; font-size: 0.7rem; color: #94a3b8; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏸 Luda's Calc</h1>
    <div class="subtitle">Smart Court Splitter</div>
    
    <div class="input-grid">
        <div class="input-group">
            <label>Full Court Fee</label>
            <input type="number" id="fullFee" value="600">
        </div>
        <div class="input-group">
            <label>Cash Paid to Club</label>
            <input type="number" id="cashPaid" value="270">
        </div>
    </div>

    <div class="input-grid">
        <div class="input-group">
            <label>Duration</label>
            <div class="select-wrapper">
                <select id="sessionHours">
                    <option value="1">1 Hour</option>
                    <option value="1.5">1.5 Hours</option>
                    <option value="2" selected>2 Hours</option>
                    <option value="2.5">2.5 Hours</option>
                    <option value="3">3 Hours</option>
                    <option value="3.5">3.5 Hours</option>
                    <option value="4">4 Hours</option>
                    <option value="4.5">4.5 Hours</option>
                    <option value="5">5 Hours</option>
                </select>
            </div>
        </div>
        <div class="input-group">
            <label>Shuttle Cost</label>
            <input type="number" id="shuttleCost" value="75">
        </div>
    </div>

    <div class="input-grid">
        <div>
            <label>Total Players</label>
            <input type="number" id="totalPlayers" value="15">
        </div>
        <div>
            <label>Actual Swipes</label>
            <input type="number" id="actualSwipes" value="22">
        </div>
    </div>

    <button onclick="calculate()">Calculate & Validate</button>

    <div id="results">
        <div class="card">
            <span class="label-text" id="plusLabel">PLUS (30 PLN off)</span>
            <span id="resPlus" class="price-text"></span>
        </div>
        <div class="card">
            <span class="label-text">LIGHT (15 PLN off)</span>
            <span id="resLight" class="price-text"></span>
        </div>
        <div class="card no-card">
            <span class="label-text">NO CARD / BLOCKED</span>
            <span id="resNoCard" class="price-text"></span>
        </div>

        <div id="validationBox" class="validation-box"></div>

        <div class="footer">
            Designed for Luda
        </div>
    </div>
</div>

<script>
    function calculate() {
        const fullFee = parseFloat(document.getElementById('fullFee').value) || 0;
        const cashPaid = parseFloat(document.getElementById('cashPaid').value) || 0;
        const shuttles = parseFloat(document.getElementById('shuttleCost').value) || 0;
        const hours = parseFloat(document.getElementById('sessionHours').value) || 1;
        const players = parseInt(document.getElementById('totalPlayers').value) || 1;
        const actualSwipes = parseInt(document.getElementById('actualSwipes').value) || 0;
        
        const swipeValue = 15.0;
        const totalToRecover = cashPaid + shuttles;

        // Group Composition (10 Plus, 2 Light, 3 None)
        const plusCount = 10;
        const lightCount = 2;
        const noneCount = 3;

        // Max possible swipes for Plus users based on duration
        const plusDiscountFactor = Math.max(1, Math.floor(hours)) * swipeValue; 
        const lightDiscountFactor = 15;

        // Logic: Standard Price = (Cash Needed + Sum of all Discounts) / Players
        const totalDiscountsGiven = (plusCount * plusDiscountFactor) + (lightCount * lightDiscountFactor);
        const standardPricePerPerson = (totalToRecover + totalDiscountsGiven) / players;

        // Individual Costs
        let plusCost = standardPricePerPerson - plusDiscountFactor;
        let lightCost = standardPricePerPerson - lightDiscountFactor;
        let noCardCost = standardPricePerPerson;

        // Verification Math
        const checkTotal = (plusCost * plusCount) + (lightCost * lightCount) + (noCardCost * noneCount);
        const diff = Math.abs(checkTotal - totalToRecover);

        // UI Updates
        document.getElementById('plusLabel').innerText = `PLUS (${plusDiscountFactor} PLN off)`;
        document.getElementById('resPlus').innerText = Math.max(0, plusCost).toFixed(2) + " PLN";
        document.getElementById('resLight').innerText = Math.max(0, lightCost).toFixed(2) + " PLN";
        document.getElementById('resNoCard').innerText = noCardCost.toFixed(2) + " PLN";
        
        const vBox = document.getElementById('validationBox');
        if (diff < 0.5) {
            vBox.className = "validation-box valid-ok";
            vBox.innerText = `✅ Verified: You will collect exactly ${totalToRecover.toFixed(2)} PLN`;
        } else {
            vBox.className = "validation-box valid-err";
            vBox.innerText = `⚠️ Balance Error: Check your Swipe count or Card types.`;
        }
        
        document.getElementById('results').style.display = 'block';
    }
</script>

</body>
</html>
