<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luda's Calculator</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LudaCalc">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2851/2851574.png">

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --glass: rgba(255, 255, 255, 0.9);
            --text: #0f172a;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: linear-gradient(135deg, #e0e7ff 0%, #fae8ff 100%);
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        .container { 
            background: var(--glass);
            backdrop-filter: blur(10px);
            width: 100%; max-width: 380px; 
            padding: 30px; border-radius: 24px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.5);
        }

        h1 { font-size: 1.75rem; text-align: center; margin: 0; color: #4338ca; letter-spacing: -0.5px; }
        .subtitle { text-align: center; font-size: 0.85rem; color: #6366f1; margin-bottom: 25px; font-weight: 500; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group { margin-bottom: 15px; }
        
        label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 6px; color: #475569; text-transform: uppercase; }
        
        input { 
            width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px; 
            font-size: 1rem; box-sizing: border-box; outline: none;
            background: rgba(255,255,255,0.8); transition: all 0.2s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }

        button { 
            width: 100%; padding: 16px; 
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white; border: none; border-radius: 14px; 
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.97); }

        #results { margin-top: 25px; animation: slideUp 0.4s ease-out; display: none; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: white; padding: 16px; border-radius: 16px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #f1f5f9;
        }

        .label-text { font-size: 0.9rem; font-weight: 600; color: #64748b; }
        .price-text { font-weight: 800; font-size: 1.25rem; color: #4338ca; }
        
        .no-card { background: #f8fafc; border: 1px dashed #cbd5e1; }
        .no-card .price-text { color: #1e293b; }

        .footer { text-align: center; font-size: 0.75rem; color: #94a3b8; margin-top: 20px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏸 Luda's Calc</h1>
    <div class="subtitle">Badminton Group Splitter</div>
    
    <div class="input-group">
        <label>Court Cash (PLN)</label>
        <input type="number" id="cashPaid" value="270">
    </div>

    <div class="input-group">
        <label>Shuttle Cost (PLN)</label>
        <input type="number" id="shuttleCost" value="75">
    </div>

    <div class="input-grid">
        <div>
            <label>Players</label>
            <input type="number" id="totalPlayers" value="15">
        </div>
        <div>
            <label>Swipes</label>
            <input type="number" id="totalSwipes" value="22">
        </div>
    </div>

    <button onclick="calculate()">Calculate Now</button>

    <div id="results">
        <div class="card">
            <span class="label-text">PLUS (2 Swipes)</span>
            <span id="resPlus" class="price-text"></span>
        </div>
        <div class="card">
            <span class="label-text">NORMAL (1 Swipe)</span>
            <span id="resNormal" class="price-text"></span>
        </div>
        <div class="card no-card">
            <span class="label-text">NO CARD / BLOCKED</span>
            <span id="resNoCard" class="price-text"></span>
        </div>
        <div class="footer">
            Total to Collect: <span id="resTotal"></span><br>
            Handcrafted for Luda
        </div>
    </div>
</div>

<script>
    function calculate() {
        const cash = parseFloat(document.getElementById('cashPaid').value) || 0;
        const shuttle = parseFloat(document.getElementById('shuttleCost').value) || 0;
        const players = parseInt(document.getElementById('totalPlayers').value) || 1;
        const swipes = parseInt(document.getElementById('totalSwipes').value) || 0;
        const swipeValue = 15.0;

        const totalToCollect = cash + shuttle;
        const trueCostPerPerson = (totalToCollect + (swipes * swipeValue)) / players;

        // Using Math.round() for clean whole numbers as requested
        const plusCost = Math.round(Math.max(0, trueCostPerPerson - (2 * swipeValue)));
        const normalCost = Math.round(Math.max(0, trueCostPerPerson - (1 * swipeValue)));
        const noCardCost = Math.round(trueCostPerPerson);

        document.getElementById('resPlus').innerText = plusCost + " PLN";
        document.getElementById('resNormal').innerText = normalCost + " PLN";
        document.getElementById('resNoCard').innerText = noCardCost + " PLN";
        document.getElementById('resTotal').innerText = totalToCollect + " PLN";
        
        document.getElementById('results').style.display = 'block';
    }
</script>

</body>
</html>
