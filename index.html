<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luda's Calculator</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LudaCalc">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2851/2851574.png">

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --glass: rgba(255, 255, 255, 0.9);
            --text: #0f172a;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: linear-gradient(135deg, #e0e7ff 0%, #fae8ff 100%);
            margin: 0; padding: 15px; 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--text);
        }

        .container { 
            background: var(--glass);
            backdrop-filter: blur(10px);
            width: 100%; max-width: 380px; 
            padding: 25px; border-radius: 24px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
            box-sizing: border-box;
        }

        h1 { font-size: 1.6rem; text-align: center; margin: 0; color: #4338ca; }
        .subtitle { text-align: center; font-size: 0.8rem; color: #6366f1; margin-bottom: 20px; font-weight: 500; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .input-group { margin-bottom: 12px; }
        
        label { display: block; font-size: 0.7rem; font-weight: 700; margin-bottom: 4px; color: #475569; text-transform: uppercase; }
        
        input { 
            width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 10px; 
            font-size: 0.95rem; box-sizing: border-box; outline: none;
            background: rgba(255,255,255,0.8);
        }

        button { 
            width: 100%; padding: 14px; 
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white; border: none; border-radius: 12px; 
            font-size: 1rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
            margin-top: 10px;
        }

        #results { margin-top: 20px; display: none; }

        .card { 
            background: white; padding: 12px 16px; border-radius: 14px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #f1f5f9;
        }

        .label-text { font-size: 0.85rem; font-weight: 600; color: #64748b; }
        .price-text { font-weight: 800; font-size: 1.15rem; color: #4338ca; }
        
        .no-card { background: #f8fafc; border: 1px dashed #cbd5e1; }
        .footer { text-align: center; font-size: 0.7rem; color: #94a3b8; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏸 Luda's Calc</h1>
    <div class="subtitle">Multi-Hour Group Splitter</div>
    
    <div class="input-group">
        <label>Full Court Fee (Before Swipes)</label>
        <input type="number" id="fullCourtFee" value="600">
    </div>

    <div class="input-grid">
        <div>
            <label>Hours</label>
            <input type="number" id="sessionHours" value="2" step="0.5">
        </div>
        <div>
            <label>Shuttle Cost</label>
            <input type="number" id="shuttleCost" value="75">
        </div>
    </div>

    <div class="input-grid">
        <div>
            <label>Total Players</label>
            <input type="number" id="totalPlayers" value="15">
        </div>
        <div>
            <label>Actual Swipes</label>
            <input type="number" id="actualSwipes" value="22">
        </div>
    </div>

    <button onclick="calculate()">Calculate Now</button>

    <div id="results">
        <div class="card">
            <span class="label-text" id="plusLabel">PLUS (30 PLN off)</span>
            <span id="resPlus" class="price-text"></span>
        </div>
        <div class="card">
            <span class="label-text">LIGHT (15 PLN off)</span>
            <span id="resLight" class="price-text"></span>
        </div>
        <div class="card no-card">
            <span class="label-text">NO CARD / BLOCKED</span>
            <span id="resNoCard" class="price-text"></span>
        </div>
        <div class="footer">
            Cash to collect: <span id="actualCash"></span> PLN<br>
            Managed by Luda
        </div>
    </div>
</div>

<script>
    function calculate() {
        const fullFee = parseFloat(document.getElementById('fullCourtFee').value) || 0;
        const shuttles = parseFloat(document.getElementById('shuttleCost').value) || 0;
        const hours = parseFloat(document.getElementById('sessionHours').value) || 1;
        const players = parseInt(document.getElementById('totalPlayers').value) || 1;
        const actualSwipes = parseInt(document.getElementById('actualSwipes').value) || 0;
        
        const swipeValue = 15.0;
        const discountTotal = actualSwipes * swipeValue;
        const cashToCollect = (fullFee - discountTotal) + shuttles;

        // Base cost if no cards existed
        const baseCostPerPerson = (fullFee + shuttles) / players;

        // Plus cards get 1 swipe per full hour (rounded down, min 1)
        const plusSwipeCount = Math.max(1, Math.floor(hours));
        const plusDiscount = plusSwipeCount * swipeValue;

        const plusCost = Math.max(0, baseCostPerPerson - plusDiscount);
        const lightCost = Math.max(0, baseCostPerPerson - 15);
        const noCardCost = baseCostPerPerson;

        // UI Updates
        document.getElementById('plusLabel').innerText = `PLUS (${plusDiscount} PLN off)`;
        document.getElementById('resPlus').innerText = plusCost.toFixed(2) + " PLN";
        document.getElementById('resLight').innerText = lightCost.toFixed(2) + " PLN";
        document.getElementById('resNoCard').innerText = noCardCost.toFixed(2) + " PLN";
        document.getElementById('actualCash').innerText = cashToCollect.toFixed(2);
        
        document.getElementById('results').style.display = 'block';
    }
</script>

</body>
</html>
